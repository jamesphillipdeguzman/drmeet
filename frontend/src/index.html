<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DrMeet - Clinic Management</title>
    <link rel="icon" type="image/png" href="images/drmeet-logo.webp" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css" />
</head>

<body>
    <div class="app-shell">
        <aside id="app-sidebar" class="sidebar expanded">
            <div class="sidebar-header">
                <div class="nav-brand">
                    <a href="#home" aria-label="Go to home">
                        <img src="images/drmeet-logo.webp" alt="DrMeet" class="brand-logo" />
                    </a>
                </div>
                <button id="sidebar-toggle" class="icon-button" type="button" aria-label="Toggle Sidebar">☰</button>
            </div>
            <div class="sidebar-user-menu">
                <button id="sidebar-user-trigger" class="sidebar-avatar-btn" type="button" aria-label="Open account menu">
                    <span class="sidebar-avatar-circle">U</span>
                    <span class="sidebar-avatar-name">My Account</span>
                </button>
                <div id="sidebar-user-popover" class="sidebar-user-popover hidden">
                    <div id="sidebar-account-meta" class="sidebar-account-meta"></div>
                    <button id="sidebar-logout-btn" class="btn btn-action-delete" type="button">Logout</button>
                </div>
            </div>
            <ul class="nav-links">
                <li><a href="#home" class="nav-link active"><span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M3 11.5 12 4l9 7.5V20a1 1 0 0 1-1 1h-5.5v-6h-5v6H4a1 1 0 0 1-1-1z"/></svg></span><span class="nav-label">Home</span></a></li>
                <li class="nav-li-doctor-dash" style="display:none"><a href="#doctor-dashboard" class="nav-link nav-link-doctor-dash"><span class="nav-icon"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 5h16v2H4V5zm2 4h12v2H6V9zm0 4h8v2H6v-2zm0 4h12v2H6v-2z"/></svg></span><span class="nav-label">Clinical</span></a></li>
                <li><a href="#book" class="nav-link nav-link-patient"><span class="nav-icon"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M19 4h-1V2h-2v2H8V2H6v2H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2zm0 16H5V10h14v10zM5 8V6h14v2H5zm2 6h4v4H7v-4z"/></svg></span><span class="nav-label">Book a visit</span></a></li>
                <li><a href="#patients" class="nav-link"><span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M12 12a5 5 0 1 0-5-5 5 5 0 0 0 5 5zm0 2c-4.4 0-8 2-8 4.5V21h16v-2.5C20 16 16.4 14 12 14z"/></svg></span><span class="nav-label">Patients</span></a></li>
                <li><a href="#doctors" class="nav-link"><span class="nav-icon"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M19 5h-3.17l-1.41-2.12A2 2 0 0 0 12.75 2h-1.5a2 2 0 0 0-1.67.88L8.17 5H5a2 2 0 0 0-2 2v10a3 3 0 0 0 3 3h12a3 3 0 0 0 3-3V7a2 2 0 0 0-2-2zm-7 12a3 3 0 1 1 0-6 3 3 0 0 1 0 6zm0-8.5c-1.93 0-3.5 1.57-3.5 3.5s1.57 3.5 3.5 3.5 3.5-1.57 3.5-3.5S13.93 8.5 12 8.5z"/></svg></span><span class="nav-label">Doctors</span></a></li>
                <li><a href="#appointments" class="nav-link"><span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M7 2h2v2h6V2h2v2h3v18H4V4h3zm11 8H6v10h12zm-6 2h2v5h-4v-2h2z"/></svg></span><span class="nav-label">Appointments</span></a></li>
                <li><a href="#users" class="nav-link"><span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M12 9a3 3 0 1 0-3-3 3 3 0 0 0 3 3zm7 3-2-.4a6.8 6.8 0 0 0-1-1.8l1.2-1.7-1.4-1.4-1.7 1.2a6.8 6.8 0 0 0-1.8-1L12 4 11.7 2h-1.4L10 4a6.8 6.8 0 0 0-1.8 1L6.5 3.8 5.1 5.2l1.2 1.7a6.8 6.8 0 0 0-1 1.8L3 12l2 .3a6.8 6.8 0 0 0 1 1.8L4.8 16l1.4 1.4 1.7-1.2a6.8 6.8 0 0 0 1.8 1l.3 2h1.4l.3-2a6.8 6.8 0 0 0 1.8-1l1.7 1.2 1.4-1.4-1.2-1.7a6.8 6.8 0 0 0 1-1.8z"/></svg></span><span class="nav-label">Users</span></a></li>
                <li><a href="#settings" class="nav-link"><span class="nav-icon"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M19.14 12.94c.04-.31.06-.63.06-.94 0-.31-.02-.63-.06-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.488.488 0 0 0-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 0 0-.49-.43h-3.84c-.24 0-.43.19-.47.42l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.04.31-.09.63-.09.94s.02.63.06.93l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.42l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg></span><span class="nav-label">Settings</span></a></li>
                <li><a href="#login" class="nav-link" id="login-link"><span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M10 17v-3h6v-4h-6V7l-5 5zM14 3h7v18h-7v-2h5V5h-5z"/></svg></span><span class="nav-label">Login</span></a></li>
            </ul>
        </aside>
        <section class="content-shell">
            <div id="session-expired-banner" class="session-expired-banner" hidden role="alert"></div>
            <header class="topbar">
                <div id="topbar-nav-tools" class="topbar-nav-tools"></div>
                <button id="command-palette-trigger" type="button" class="btn ghost btn-secondary">Open search (Ctrl/Cmd+K)</button>
            </header>
            <main id="main-content">
                <!-- Dynamic content will be injected here by app.js -->
            </main>
        </section>
    </div>
    <div id="command-palette" class="command-palette hidden">
        <div class="command-panel">
            <input id="command-input" type="text" placeholder="Jump to pages, doctors, patients, appointments..." />
            <ul id="command-results"></ul>
        </div>
    </div>
    <div id="floating-chat-widget" class="floating-chat-widget hidden" aria-hidden="true">
        <button type="button" id="floating-chat-toggle" class="floating-chat-fab" aria-label="Open messages" aria-expanded="false">💬</button>
        <div id="floating-chat-panel" class="floating-chat-panel hidden" role="dialog" aria-label="Messages">
            <div class="floating-chat-panel-head">
                <span>Messages</span>
                <div class="floating-chat-head-actions">
                    <button type="button" id="floating-chat-close" class="btn btn-secondary btn-sm" aria-label="Close">×</button>
                </div>
            </div>
            <div class="floating-chat-body messenger-panel-body">
                <div id="floating-messenger-root" class="messenger-shell messenger-shell--floating" data-messenger-scope="floating">
                    <div class="messenger-layout" data-messenger-layout>
                        <aside class="messenger-sidebar">
                            <div class="messenger-sidebar-toolbar">
                                <input type="search" data-messenger-search class="messenger-search-input" placeholder="Search conversations…" autocomplete="off" />
                            </div>
                            <div class="messenger-conversation-list" data-messenger-conversation-list></div>
                        </aside>
                        <section class="messenger-main">
                            <div class="messenger-thread-empty" data-messenger-empty>
                                <p>Select a conversation</p>
                            </div>
                            <div class="messenger-thread-panel hidden" data-messenger-active>
                                <header class="messenger-thread-topbar">
                                    <div class="messenger-peer">
                                        <img data-messenger-peer-avatar class="person-avatar" alt="" src="images/user-line.svg" />
                                        <strong data-messenger-peer-name>Chat</strong>
                                    </div>
                                    <button type="button" class="messenger-thread-close-x" data-messenger-clear type="button" aria-label="Close conversation">&times;</button>
                                </header>
                                <p class="typing-indicator messenger-typing" data-messenger-typing></p>
                                <div class="messenger-thread-body">
                                    <button type="button" class="messenger-thread-fab" data-messenger-compose aria-label="Compose message" title="Compose">
                                        <img src="images/edit-circle-line.svg" alt="" width="22" height="22" class="messenger-action-icon message-compose-icon" />
                                    </button>
                                    <div class="messenger-thread-scroll thread-list" data-messenger-scroll></div>
                                    <footer class="messenger-compose-footer thread-drawer-reply">
                                        <label class="messenger-file-upload message-compose-btn" title="Attach file" aria-label="Attach file">
                                            <img src="images/chat-upload-line.svg" alt="" class="messenger-action-icon message-compose-icon" width="22" height="22" />
                                            <input type="file" data-messenger-file-input accept="image/*,.pdf,.doc,.docx,.txt" />
                                        </label>

                                        <div class="message-compose-pill">
                                            <textarea id="floating-messenger-reply" class="messenger-compose-input" data-messenger-reply-text rows="2" placeholder="Type a message…" autocomplete="off" aria-label="Message"></textarea>
                                            <button type="button" class="message-compose-emoji" aria-label="Insert emoji" title="Emoji">😊</button>
                                        </div>

                                        <button type="button" class="messenger-send-icon-btn message-compose-btn" data-messenger-send aria-label="Send message" title="Send">
                                            <img src="images/send-plane-2-line.svg" alt="" width="22" height="22" class="messenger-action-icon message-compose-icon" />
                                        </button>
                                    </footer>
                                </div>
                            </div>
                        </section>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <footer>
        <div class="footer-links">
            <a href="#home">Home</a>
            <a href="#book">Book a Visit</a>
            <a href="#privacy">Privacy</a>
        </div>
        <div class="footer-social">
            <a href="https://facebook.com" target="_blank" rel="noreferrer" aria-label="Facebook"><img src="images/facebook-circle-fill.svg" alt="Facebook" class="social-icon" /></a>
            <a href="https://youtube.com" target="_blank" rel="noreferrer" aria-label="YouTube"><img src="images/youtube-fill.svg" alt="YouTube" class="social-icon" /></a>
            <a href="https://x.com" target="_blank" rel="noreferrer" aria-label="X (Twitter)"><img src="images/twitter-x-fill.svg" alt="X" class="social-icon" /></a>
        </div>
        <p>&copy; 2026 DrMeet. All rights reserved.</p>
    </footer>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
