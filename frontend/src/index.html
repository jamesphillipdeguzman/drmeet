<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DrMeet - Clinic Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css" />
</head>

<body>
    <div class="app-shell">
        <aside id="app-sidebar" class="sidebar expanded">
            <div class="sidebar-header">
                <div class="nav-brand"><a href="https://drmeet-wqws.onrender.com/api-docs" target="_blank">DrMeet</a></div>
                <button id="sidebar-toggle" class="icon-button" type="button" aria-label="Toggle Sidebar">☰</button>
            </div>
            <ul class="nav-links">
                <li><a href="#home" class="nav-link active"><span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M3 11.5 12 4l9 7.5V20a1 1 0 0 1-1 1h-5.5v-6h-5v6H4a1 1 0 0 1-1-1z"/></svg></span><span class="nav-label">Home</span></a></li>
                <li><a href="#book" class="nav-link nav-link-patient"><span class="nav-icon"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M19 4h-1V2h-2v2H8V2H6v2H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2zm0 16H5V10h14v10zM5 8V6h14v2H5zm2 6h4v4H7v-4z"/></svg></span><span class="nav-label">Book a visit</span></a></li>
                <li><a href="#patients" class="nav-link"><span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M12 12a5 5 0 1 0-5-5 5 5 0 0 0 5 5zm0 2c-4.4 0-8 2-8 4.5V21h16v-2.5C20 16 16.4 14 12 14z"/></svg></span><span class="nav-label">Patients</span></a></li>
                <li><a href="#doctors" class="nav-link"><span class="nav-icon"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg></span><span class="nav-label">Doctors</span></a></li>
                <li><a href="#appointments" class="nav-link"><span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M7 2h2v2h6V2h2v2h3v18H4V4h3zm11 8H6v10h12zm-6 2h2v5h-4v-2h2z"/></svg></span><span class="nav-label">Appointments</span></a></li>
                <li><a href="#users" class="nav-link"><span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M12 9a3 3 0 1 0-3-3 3 3 0 0 0 3 3zm7 3-2-.4a6.8 6.8 0 0 0-1-1.8l1.2-1.7-1.4-1.4-1.7 1.2a6.8 6.8 0 0 0-1.8-1L12 4 11.7 2h-1.4L10 4a6.8 6.8 0 0 0-1.8 1L6.5 3.8 5.1 5.2l1.2 1.7a6.8 6.8 0 0 0-1 1.8L3 12l2 .3a6.8 6.8 0 0 0 1 1.8L4.8 16l1.4 1.4 1.7-1.2a6.8 6.8 0 0 0 1.8 1l.3 2h1.4l.3-2a6.8 6.8 0 0 0 1.8-1l1.7 1.2 1.4-1.4-1.2-1.7a6.8 6.8 0 0 0 1-1.8z"/></svg></span><span class="nav-label">Users</span></a></li>
                <li><a href="#login" class="nav-link" id="login-link"><span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M10 17v-3h6v-4h-6V7l-5 5zM14 3h7v18h-7v-2h5V5h-5z"/></svg></span><span class="nav-label">Login</span></a></li>
                <li><a href="#signup" class="nav-link" id="signup-link"><span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M19 11h-6V5h-2v6H5v2h6v6h2v-6h6z"/></svg></span><span class="nav-label">Signup</span></a></li>
            </ul>
        </aside>
        <section class="content-shell">
            <header class="topbar">
                <button id="command-palette-trigger" type="button" class="btn ghost btn-secondary">Open search (Ctrl/Cmd+K)</button>
            </header>
            <main id="main-content">
                <!-- Dynamic content will be injected here by app.js -->
            </main>
        </section>
    </div>
    <div id="command-palette" class="command-palette hidden">
        <div class="command-panel">
            <input id="command-input" type="text" placeholder="Jump to pages, doctors, patients, appointments..." />
            <ul id="command-results"></ul>
        </div>
    </div>
    <footer>
        <p>&copy; 2024 DrMeet All rights reserved.</p>
    </footer>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
